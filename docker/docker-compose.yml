services:
  backend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter backend prisma:generate && pnpm --filter backend migrate:deploy && pnpm --filter backend seed && pnpm --filter backend dev"
    environment:
      PORT: '3001'
      DATABASE_URL: 'file:../../database/roots.db'
      JWT_SECRET: 'docker-dev-secret-change-me'
      NODE_ENV: 'development'
      UPLOAD_DIR: '../uploads'
      BACKUP_DIR: '../backups'
      CORS_ORIGIN: 'http://localhost:5173'
    volumes:
      - ..:/app
    ports:
      - '3001:3001'

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter frontend dev --host 0.0.0.0"
    environment:
      VITE_API_URL: 'http://localhost:3001'
    volumes:
      - ..:/app
    ports:
      - '5173:5173'
    depends_on:
      - backend
